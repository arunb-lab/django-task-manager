# =============================================================================
# .github/workflows/ci.yml — GitHub Actions CI/CD Pipeline
# =============================================================================
#
# WHAT IS CI/CD?
#   CI = Continuous Integration  — Automatically test every code change
#   CD = Continuous Deployment   — Automatically deploy passing code
#
# WHAT IS GITHUB ACTIONS?
#   GitHub Actions is GitHub built-in automation platform.
#   Every time someone pushes code or opens a Pull Request, GitHub
#   automatically runs this file on GitHub own servers — for FREE
#   on public repositories.
#
# HOW TO READ THIS FILE:
#   This is YAML format. Indentation matters (use spaces, not tabs).
#   - "on:" defines WHEN the workflow runs
#   - "jobs:" defines WHAT to run
#   - "steps:" are the individual commands within a job
#
# STATUS BADGE: Add this to your README to show build status:
# ![CI](https://github.com/arunb-lab/django-task-manager/actions/workflows/ci.yml/badge.svg)
# =============================================================================

name: Django CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1: test
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 coverage

      - name: Lint with flake8
        run: |
          # Stop the build on Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=migrations
          # Run full style check as warnings only
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics --exclude=migrations

      - name: Run Django system checks
        run: python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: taskmanager.settings

      - name: Run migrations
        run: python manage.py migrate --run-syncdb
        env:
          DJANGO_SETTINGS_MODULE: taskmanager.settings

      - name: Run tests with coverage
        run: |
          coverage run --source=. manage.py test tasks --verbosity=2
          coverage report
        env:
          DJANGO_SETTINGS_MODULE: taskmanager.settings

      - name: Generate XML coverage report
        run: coverage xml
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # JOB 2: security
  # ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pip-audit
          pip install -r requirements.txt

      - name: Audit dependencies for vulnerabilities
        run: pip-audit -r requirements.txt
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # JOB 3: summary
  # ---------------------------------------------------------------------------
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, security]
    if: always()

    steps:
      - name: Print CI result
        run: |
          echo "================================================="
          echo "  Django Task Manager CI/CD Pipeline Complete!"
          echo "================================================="
          echo "Tests result:    ${{ needs.test.result }}"
          echo "Security result: ${{ needs.security.result }}"
          echo "================================================="
          echo ""
          echo "Thank you to all contributors! Keep building! 🌍"
